<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" type="image/x-icon" href="https://cdn.autodesk.io/favicon.ico">
    <link rel="stylesheet" href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.css">
    <link rel="stylesheet" href="/main.css">
    <title>Autodesk Platform Services: Simple Viewer</title>
</head>

<body>
    <div id="header" style="position: relative; z-index: 1000;">
        <img class="logo" src="https://cdn.autodesk.io/logo/black/stacked.png" alt="Autodesk Platform Services">
        <span class="title">Simple Viewer</span>
        <select name="models" id="models"></select>
        <button id="upload" title="Upload New Model">Upload</button>
        <input style="display: none" type="file" id="input">
    </div>

    <div id="app-container" style="position: relative; width: 100vw; height: 100vh; overflow: hidden;">

        <div id="property-panel">

            <div id="qa-panel" style="margin-bottom: 15px; background: #fff; padding: 10px; border: 1px solid #ccc;">
                <h3>Model Quality Assurance</h3>
                <label><input type="checkbox" id="rule-uniclass" checked> Require Uniclass</label><br>
                <label><input type="checkbox" id="rule-level" checked> Require Level Data</label><br>
                <label><input type="checkbox" id="rule-generic" checked> Reject Generic Models</label>
                <button id="run-qa-btn"
                    style="margin-top: 10px; padding: 6px 12px; background: #0059a1; color: white; border: none; cursor: pointer;">
                    Run Compliance Scan
                </button>
            </div>
            <h3>BIM Agent</h3>

            <div style="display: flex; gap: 8px; margin-bottom: 15px;">
                <input type="text" id="search-input" placeholder="e.g. How many doors..."
                    style="flex: 1; padding: 6px;">
                <button id="ask-btn" disabled style="padding: 6px 12px; cursor: not-allowed; opacity: 0.5;">Ask</button>
            </div>

            <div id="agent-response"
                style="font-size: 13px; color: #222; background: #f0f4f8; padding: 12px; border-left: 4px solid #0056b3; border-radius: 4px;">
            </div>

            <div id="validation-dashboard"
                style="display: none; margin-top: 15px; background: #fff0f0; border: 1px solid #ffcccc; border-radius: 6px; padding: 15px;">
                <h4 style="color: #d8000c; margin-top: 0;">🚨 Model Validation Failed</h4>
                <ul id="validation-list" style="padding-left: 20px; font-size: 13px; color: #333;">
                </ul>
                <button id="isolate-errors-btn"
                    style="width: 100%; padding: 8px; background: #d8000c; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px;">
                    Isolate Failed Items in Viewer
                </button>
            </div>
        </div>

    </div>

    <div id="preview"></div>
    <div id="overlay"></div>
    <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.js"></script>
    <script src="/main.js?v=3" type="module"></script>
</body>

</html>
